version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    ignore:
      # Major bumps of heavy binary deps are reviewed manually.
      - dependency-name: "playwright"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pyautogui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Pillow"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "build(deps-ui)"
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
